<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Learner Chat</title>
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 text-gray-100 h-screen flex flex-col">
        <main
            class="flex-1 overflow-y-auto px-4 py-6 max-w-3xl mx-auto w-full"
            id="messages"
        >
            <div class="text-center text-gray-500 mt-20">
                <p class="text-2xl font-light">Ask me anything</p>
                <p class="text-sm mt-2">Based on the loaded knowledge base</p>
            </div>
        </main>

        <footer class="border-t border-gray-700 bg-gray-800 px-4 py-4">
            <form
                hx-post="/chat"
                hx-target="#messages"
                hx-swap="beforeend"
                hx-on::after-request="this.reset()"
                class="max-w-3xl mx-auto flex gap-2"
            >
                <input
                    type="text"
                    name="question"
                    placeholder="Ask a question..."
                    autofocus
                    required
                    class="flex-1 bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button
                    type="submit"
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 rounded-xl px-5 py-3 font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span id="send-text">Send</span>
                    <svg id="send-spinner" class="hidden animate-spin h-5 w-5 mx-auto" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                </button>
            </form>
        </footer>

        <script>
            document.body.addEventListener("htmx:afterSwap", function () {
                const el = document.getElementById("messages");
                el.scrollTop = el.scrollHeight;
            });

            function setLoading(loading) {
                const btn = document.getElementById("send-btn");
                const text = document.getElementById("send-text");
                const spinner = document.getElementById("send-spinner");
                btn.disabled = loading;
                text.classList.toggle("hidden", loading);
                spinner.classList.toggle("hidden", !loading);
            }

            document.body.addEventListener("htmx:beforeRequest", function () {
                setLoading(true);
            });

            document.body.addEventListener("htmx:afterRequest", function () {
                setLoading(false);
            });
        </script>
    </body>
</html>
