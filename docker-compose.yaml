services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  app:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
    depends_on:
      - chromadb

volumes:
  chroma_data:
